name: Build-Alan-VIP
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # دیاریکردنی ڕێڕەوی تیۆس
          export THEOS=/Users/runner/theos
          
          # دڵنیابوون لەوەی هیچ پاشماوەیەک نەماوە
          rm -rf $THEOS
          
          # تەنها کلۆنکردنی تیۆس بەبێ SDK سەرەتا
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # سڕینەوەی فۆڵدەری SDK ئەگەر هەبێت و دواتر داگرتنی SDKـەکان
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Project
        run: |
          export THEOS=/Users/runner/theos
          # گەڕان بەدوای Makefile و دەستپێکردنی Build
          for dir in $(find . -name "Makefile" -exec dirname {} \;); do
            echo "Building in $dir..."
            cd $dir && make FINALPACKAGE=1 && cd -
          done
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alan-VIP-Output
          path: |
            packages/*.deb
            **/.theos/obj/*.dylib
            **/*.dylib
