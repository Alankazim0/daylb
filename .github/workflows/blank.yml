name: Build-Alan-VIP
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos and SDKs
        run: |
          export THEOS=/Users/runner/theos
          # سڕینەوەی هەر فۆڵدەرێکی کۆن بۆ ئەوەی هەڵە نەدات
          sudo rm -rf $THEOS
          
          # داگرتنی تیۆس
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # داگرتنی SDKـەکان بە شێوەیەکی ڕاستەوخۆ بۆ ناو فۆڵدەرە دروستەکە
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Project
        run: |
          export THEOS=/Users/runner/theos
          # ئەگەر فایلی پاکێجت هەیە، ئەمە جێبەجێ دەکات
          make clean
          make FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alan-VIP-Output
          path: |
            packages/*.deb
            .theos/obj/*.dylib
