- name: Build Project
        run: |
          export THEOS=/Users/runner/theos
          # گەڕان بەدوای Makefile و دەستپێکردنی Build
          find . -name "Makefile" | while read -r makefile; do
            dir=$(dirname "$makefile")
            echo "🚀 Building in: $dir"
            # لێرە 'make clean'مان لابرد چونکە فۆڵدەرەکە تازەیە و پێویست ناکات
            cd "$dir" && make FINALPACKAGE=1
            cd -
          done
