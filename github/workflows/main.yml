name: Build-Alan-VIP
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Theos
        run: |
          export THEOS=/Users/runner/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.4.sdk.tar.xz
          tar -xf iPhoneOS14.4.sdk.tar.xz -C $THEOS/sdks
      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          make FINALPACKAGE=1
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alan-Dylib-File
          path: "**/*.dylib"
